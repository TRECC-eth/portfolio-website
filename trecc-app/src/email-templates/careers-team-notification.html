<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New career application — TRECC</title>
</head>
<body style="margin:0;padding:0;background:#0a0a0a;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:#ffffff;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0a0a0a;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:640px;background:#111111;border:1px solid #2a2a2a;border-radius:18px;overflow:hidden;">
          <tr>
            <td style="padding:32px 36px;border-bottom:1px solid #1f1f1f;">
              <p style="margin:0 0 10px;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:#606468;">TRECC Careers</p>
              <h1 style="margin:0;color:#ffffff;font-size:28px;line-height:1.25;font-weight:700;">New application</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 36px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #2a2a2a;border-radius:14px;overflow:hidden;">
                <tr><td style="padding:14px 16px;border-bottom:1px solid #1f1f1f;color:#606468;font-size:12px;">Role</td><td style="padding:14px 16px;border-bottom:1px solid #1f1f1f;color:#d7d7b6;font-size:14px;">{{role}}</td></tr>
                <tr><td style="padding:14px 16px;border-bottom:1px solid #1f1f1f;color:#606468;font-size:12px;">Name</td><td style="padding:14px 16px;border-bottom:1px solid #1f1f1f;color:#d7d7b6;font-size:14px;">{{applicant_name}}</td></tr>
                <tr><td style="padding:14px 16px;border-bottom:1px solid #1f1f1f;color:#606468;font-size:12px;">Email</td><td style="padding:14px 16px;border-bottom:1px solid #1f1f1f;color:#d7d7b6;font-size:14px;">{{applicant_email}}</td></tr>
                <tr><td style="padding:14px 16px;border-bottom:1px solid #1f1f1f;color:#606468;font-size:12px;">Telegram</td><td style="padding:14px 16px;border-bottom:1px solid #1f1f1f;color:#d7d7b6;font-size:14px;">{{applicant_telegram}}</td></tr>
                <tr><td style="padding:14px 16px;border-bottom:1px solid #1f1f1f;color:#606468;font-size:12px;">Timezone</td><td style="padding:14px 16px;border-bottom:1px solid #1f1f1f;color:#d7d7b6;font-size:14px;">{{applicant_timezone}}</td></tr>
                <tr><td style="padding:14px 16px;border-bottom:1px solid #1f1f1f;color:#606468;font-size:12px;">Links</td><td style="padding:14px 16px;border-bottom:1px solid #1f1f1f;color:#d7d7b6;font-size:14px;">{{applicant_links}}</td></tr>
                <tr><td style="padding:14px 16px;color:#606468;font-size:12px;vertical-align:top;">Experience</td><td style="padding:14px 16px;color:#8a8d93;font-size:14px;line-height:1.6;">{{applicant_experience}}</td></tr>
                <tr><td style="padding:14px 16px;color:#606468;font-size:12px;vertical-align:top;">Note</td><td style="padding:14px 16px;color:#8a8d93;font-size:14px;line-height:1.6;">{{applicant_note}}</td></tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
